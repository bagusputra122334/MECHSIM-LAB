<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Mechsim Lab</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0066FF;
            --blue-dark: #0047CC;
            --blue-light: #E8F1FF;
            --orange: #FF8A00;
            --orange-light: #FFE0C2;
            --text: #1A237E;
            --text-muted: rgba(26,35,126,0.72);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg,rgba(0,102,255,0.9) 0%,rgba(77,163,255,0.9) 60%); 
            min-height: 100vh; 
            color: var(--text); 
            display: flex; 
            align-items: flex-start; 
            justify-content: center; 
            padding: 20px;
            overflow-y: auto;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .back-home {
            text-align: center;
            margin-bottom: 20px;
        }
        .back-home a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            padding: 8px 16px;
            border-radius: 20px;
        }
        .back-home a:hover {
            color: var(--orange);
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(255,138,0,0.8);
        }

        .login-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 32px 28px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.2);
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .login-card .logo { 
            margin-bottom: 16px; 
            display: flex; 
            justify-content: center; 
            animation: float 3s ease-in-out infinite; 
        }
        .login-card .logo img { height: 70px; width: auto; }
        .login-card p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .section-divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-divider::before,
        .section-divider::after {
            content: "";
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,102,255,0.2), transparent);
        }
        .section-divider span {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { text-align: left; margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #BBDEFB;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            background: rgba(245,250,255,0.9);
            transition: all 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(0,102,255,0.15);
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px 24px;
            font-weight: 800;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            letter-spacing: .5px;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { 
            transform: translateY(-3px) scale(1.02); 
        }
        .btn:active {
            transform: translateY(2px) scale(0.98);
        }

        .btn-primary { 
            background: linear-gradient(135deg, #0066FF 0%, #0047CC 100%);
            color: #fff; 
            box-shadow: 0 8px 0 0 #002D8A, 0 14px 30px rgba(0,102,255,0.35);
        }
        .btn-primary:hover {
            box-shadow: 0 12px 0 0 #002D8A, 0 20px 40px rgba(0,102,255,0.45);
        }
        .btn-primary:active {
            box-shadow: 0 3px 0 0 #002D8A, 0 6px 15px rgba(0,102,255,0.25);
        }

        .btn-secondary { 
            background: linear-gradient(135deg, #64748B 0%, #475569 100%);
            color: #fff; 
            box-shadow: 0 8px 0 0 #334155, 0 14px 30px rgba(100,116,139,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            box-shadow: 0 12px 0 0 #334155, 0 20px 40px rgba(100,116,139,0.45);
        }
        .btn-secondary:active {
            box-shadow: 0 3px 0 0 #334155, 0 6px 15px rgba(100,116,139,0.25);
        }

        .btn-teacher-toggle { 
            background: linear-gradient(135deg, #FF8A00 0%, #E67600 100%);
            color: #fff; 
            box-shadow: 0 6px 0 0 #B35900, 0 10px 20px rgba(255,138,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            padding: 10px 18px;
            font-size: 14px;
        }
        .btn-teacher-toggle:hover {
            box-shadow: 0 12px 0 0 #B35900, 0 20px 40px rgba(255,138,0,0.45);
        }
        .btn-teacher-toggle:active {
            box-shadow: 0 3px 0 0 #B35900, 0 6px 15px rgba(255,138,0,0.25);
        }

        .teacher-form {
            display: none;
            margin-top: 16px;
            padding-top: 20px;
            border-top: 2px dashed rgba(0,102,255,0.15);
            animation: slideDown 0.3s ease-out;
        }
        .teacher-form.active {
            display: block;
        }

        .login-error {
            color: #EF4444;
            font-size: 13px;
            font-weight: 700;
            margin-top: 12px;
            display: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .login-wrapper { padding: 15px; }
            .login-card { padding: 32px 24px; border-radius: 24px; }
            .login-card .logo img { height: 70px; }
            .login-card p.subtitle { font-size: 13px; }
            #student-section h3, #teacher-section h3 { font-size: 1.3rem; }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .login-card { padding: 28px 20px; }
            .login-card .logo img { height: 60px; }
            .btn { padding: 12px 20px; font-size: 15px; }
            .form-group input { padding: 12px 15px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="login-wrapper">
        <div class="back-home">
            <a href="index.html">← Kembali ke Beranda</a>
        </div>

        <div class="login-card">
            <div class="logo">
                <img src="img/logo-meshsim.png" alt="Logo MeshSim">
            </div>
            <p class="subtitle">Power Flow Simulator — Manual Transmission</p>

            <!-- Form Login Siswa -->
            <div id="student-section">
                <h3 style="font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 16px; color: var(--blue-dark);">
                    🚀 Mulai Simulasi Siswa
                </h3>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="student-name" placeholder="Masukkan nama lengkap...">
                </div>
                <div class="form-group">
                    <label>Nomor Absen</label>
                    <input type="text" id="student-absen" placeholder="Contoh: 15">
                </div>
                <button class="btn btn-primary" id="btn-student-login">
                    Masuk Sebagai Siswa
                </button>
                <p class="login-error" id="student-error">⚠ Nama dan nomor absen harus diisi!</p>
            </div>

            <!-- Divider -->
            <div class="section-divider">
                <span>Atau</span>
            </div>

            <!-- Tombol Toggle Guru -->
            <button class="btn btn-teacher-toggle" id="btn-toggle-teacher">
                👨‍🏫 Masuk Sebagai Guru
            </button>

            <!-- Form Login Guru (Hidden by default) -->
            <div id="teacher-section" class="teacher-form">
                <h3 style="font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 16px; color: var(--orange);">
                    👩‍🏫 Login Guru
                </h3>
                <div class="form-group">
                    <label>Nama Guru</label>
                    <input type="text" id="teacher-name" placeholder="Masukkan nama Anda...">
                </div>
                <div class="form-group">
                    <label>NIP</label>
                    <input type="text" id="teacher-nip" placeholder="Masukkan NIP (contoh: 12345)">
                </div>
                <button class="btn btn-primary" id="btn-teacher-login" style="background: linear-gradient(135deg, #10B981 0%, #059669 100%); box-shadow:0 8px 0 0 #047857, 0 14px 30px rgba(16,185,129,0.35);">
                    Masuk Ke Dashboard
                </button>
                <p class="login-error" id="teacher-error">⚠ Nama dan NIP harus diisi!</p>
            </div>
        </div>
    </div>

    <script>
        // Element references
        const btnToggleTeacher = document.getElementById('btn-toggle-teacher');
        const teacherSection = document.getElementById('teacher-section');
        const studentSection = document.getElementById('student-section');
        const btnStudentLogin = document.getElementById('btn-student-login');
        const btnTeacherLogin = document.getElementById('btn-teacher-login');
        const studentName = document.getElementById('student-name');
        const studentAbsen = document.getElementById('student-absen');
        const teacherName = document.getElementById('teacher-name');
        const teacherNip = document.getElementById('teacher-nip');
        const studentError = document.getElementById('student-error');
        const teacherError = document.getElementById('teacher-error');

        // Toggle Guru Form
        let isTeacherFormOpen = false;
        btnToggleTeacher.addEventListener('click', () => {
            isTeacherFormOpen = !isTeacherFormOpen;
            if (isTeacherFormOpen) {
                studentSection.style.display = 'none';
                teacherSection.classList.add('active');
                btnToggleTeacher.innerHTML = '⬅️ Kembali Ke Login Siswa';
            } else {
                studentSection.style.display = 'block';
                teacherSection.classList.remove('active');
                btnToggleTeacher.innerHTML = '👨‍🏫 Masuk Sebagai Guru';
            }
        });

        // Login Siswa
        btnStudentLogin.addEventListener('click', async () => {
            const nama = studentName.value.trim();
            const absen = studentAbsen.value.trim();

            if (!nama || !absen) {
                studentError.style.display = 'block';
                return;
            }
            studentError.style.display = 'none';

            // Gunakan Supabase untuk get atau buat siswa
            const existingSiswa = await getOrCreateSiswa(nama, absen);
            if (!existingSiswa) {
                alert('Gagal login, coba lagi!');
                return;
            }

            localStorage.setItem('currentSiswa', JSON.stringify(existingSiswa));
            startKeepAliveSupabase(existingSiswa.id);
            window.location.href = 'simulasimain.html';
        });

        // Login Guru
        btnTeacherLogin.addEventListener('click', () => {
            const nama = teacherName.value.trim();
            const nip = teacherNip.value.trim();

            if (!nama || !nip) {
                teacherError.style.display = 'block';
                return;
            }
            teacherError.style.display = 'none';

            // Simpan status login guru dan nama guru
            localStorage.setItem('guruLoggedIn', 'true');
            localStorage.setItem('guruName', nama);
            localStorage.setItem('guruNip', nip);
            window.location.href = 'guru_dashboard.html';
        });

        // Enter key handlers
        ['student-name', 'student-absen'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if (e.key === 'Enter') btnStudentLogin.click();
            });
        });
        ['teacher-name', 'teacher-nip'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if (e.key === 'Enter') btnTeacherLogin.click();
            });
        });

        // THREE.js Background
        (function init3DBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(10, 10, 10);
            scene.add(directionalLight);
            const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
            backLight.position.set(-5, -5, -5);
            scene.add(backLight);

            function createGear(radius, teeth, depth, color) {
                const shape = new THREE.Shape();
                const toothDepth = radius * 0.2;
                const innerRadius = radius - toothDepth;
                const toothAngle = (Math.PI * 2) / teeth;

                for (let i = 0; i < teeth; i++) {
                    const angle = i * toothAngle;
                    const nextAngle = (i + 0.4) * toothAngle;
                    const nextAngle2 = (i + 0.6) * toothAngle;
                    const nextAngle3 = (i + 1) * toothAngle;

                    const x1 = Math.cos(angle) * innerRadius;
                    const y1 = Math.sin(angle) * innerRadius;
                    const x2 = Math.cos(nextAngle) * radius;
                    const y2 = Math.sin(nextAngle) * radius;
                    const x3 = Math.cos(nextAngle2) * radius;
                    const y3 = Math.sin(nextAngle2) * radius;
                    const x4 = Math.cos(nextAngle3) * innerRadius;
                    const y4 = Math.sin(nextAngle3) * innerRadius;

                    if (i === 0) shape.moveTo(x1, y1);
                    shape.lineTo(x2, y2);
                    shape.lineTo(x3, y3);
                    shape.lineTo(x4, y4);
                }
                shape.closePath();

                const hole = new THREE.Path();
                hole.absarc(0, 0, innerRadius * 0.3, 0, Math.PI * 2, true);
                shape.holes.push(hole);

                const extrudeSettings = {
                    depth: depth,
                    bevelEnabled: true,
                    bevelSegments: 3,
                    steps: 1,
                    bevelSize: 0.1,
                    bevelThickness: 0.1
                };

                const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                geometry.center();

                const material = new THREE.MeshPhongMaterial({
                    color: color,
                    shininess: 120,
                    specular: 0x444444,
                    transparent: true,
                    opacity: 0.85
                });

                return new THREE.Mesh(geometry, material);
            }

            const gears = [];
            const colors = [0x0066FF, 0xFF8A00, 0xFFD700, 0x00ACC1, 0x7B1FA2];
            const teethCounts = [12, 16, 20, 24];
            
            for (let i = 0; i < 12; i++) {
                const radius = Math.random() * 1.2 + 0.6;
                const teeth = teethCounts[Math.floor(Math.random() * teethCounts.length)];
                const depth = Math.random() * 0.4 + 0.2;
                
                const gear = createGear(radius, teeth, depth, colors[i % colors.length]);
                
                gear.position.set(
                    (Math.random() - 0.5) * 28,
                    (Math.random() - 0.5) * 18,
                    (Math.random() - 0.5) * 15
                );
                
                gear.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                
                gear.userData = {
                    rotationSpeed: (Math.random() * 0.02 + 0.005) * (Math.random() > 0.5 ? 1 : -1),
                    floatOffset: Math.random() * Math.PI * 2,
                    floatSpeed: Math.random() * 0.4 + 0.3,
                    originalY: gear.position.y,
                    rotationAxis: Math.floor(Math.random() * 3)
                };
                
                gears.push(gear);
                scene.add(gear);
            }

            camera.position.z = 14;

            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.008;

                gears.forEach((gear, index) => {
                    if (gear.userData.rotationAxis === 0) gear.rotation.x += gear.userData.rotationSpeed;
                    else if (gear.userData.rotationAxis === 1) gear.rotation.y += gear.userData.rotationSpeed;
                    else gear.rotation.z += gear.userData.rotationSpeed;
                    
                    gear.position.y = gear.userData.originalY + Math.sin(time * gear.userData.floatSpeed + gear.userData.floatOffset) * 1.5;
                    gear.position.x += Math.sin(time * 0.3 + index * 0.5) * 0.005;
                });

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
